<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceBridge — 实时翻译</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>🌐 VoiceBridge</h1>
        <p class="subtitle">实时语音翻译 · 单人模式</p>

        <!-- Language Selection -->
        <div class="lang-row">
            <div class="lang-group">
                <label>我说</label>
                <select id="sourceLang">
                    <option value="zh" selected>中文</option>
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="ar">العربية</option>
                    <option value="pt">Português</option>
                </select>
            </div>
            <div class="swap-icon">↔</div>
            <div class="lang-group">
                <label>对方说</label>
                <select id="targetLang">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="es" selected>Español</option>
                    <option value="ar">العربية</option>
                    <option value="pt">Português</option>
                </select>
            </div>
        </div>

        <!-- Audio Output -->
        <div class="output-row">
            <button id="outputToggle" class="btn-outline" title="切换音频输出">
                🔊 扬声器
            </button>
        </div>

        <!-- Main Button -->
        <button id="startBtn" class="btn-main">
            🎤 开始翻译
        </button>

        <!-- Status -->
        <div id="status" class="status idle">○ 已就绪</div>

        <!-- Current Translation -->
        <div id="currentCard" class="card hidden">
            <div class="card-label">当前翻译</div>
            <div id="currentOriginal" class="card-original"></div>
            <div id="currentTranslated" class="card-translated"></div>
        </div>

        <!-- History -->
        <div id="historySection" class="history-section">
            <h3>翻译记录</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
