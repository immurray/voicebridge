<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceBridge — 实时语音翻译</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>VoiceBridge</h1>
            <p class="subtitle">实时双向语音翻译 — 保留你的声音</p>
        </header>

        <main>
            <!-- Create Session -->
            <div class="card" id="create-card">
                <h2>创建会话</h2>
                <div class="form-group">
                    <label>我说</label>
                    <select id="create-lang" class="select">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="createSession()">
                    创建会话
                </button>
                <div id="create-result" class="result hidden"></div>
            </div>

            <div class="divider"><span>或</span></div>

            <!-- Join Session -->
            <div class="card" id="join-card">
                <h2>加入会话</h2>
                <div class="form-group">
                    <label>会话 ID</label>
                    <input type="text" id="join-session-id" class="input" placeholder="输入对方分享的会话 ID">
                </div>
                <div class="form-group">
                    <label>我说</label>
                    <select id="join-lang" class="select">
                        <option value="en">English</option>
                        <option value="zh">中文</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="joinSession()">
                    加入会话
                </button>
                <div id="join-result" class="result hidden"></div>
            </div>
        </main>

        <footer>
            <p>VoiceBridge v0.1 · <span id="status-dot" class="dot offline"></span> <span id="status-text">未连接</span></p>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
